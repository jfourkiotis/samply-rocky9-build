name: Build samply + self-hosted profiler on Rocky Linux 9

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  # Pin the Firefox Profiler frontend to a specific upstream commit so
  # builds are reproducible. Bump this to pick up new viewer features.
  PROFILER_REF: 3a952f5aee16fd8f08e5b4afd7827e7a9fa5fcd4

jobs:
  build-samply:
    name: Build samply (Rocky Linux 9)
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install build dependencies
        # `curl-minimal` ships in the rockylinux:9 image and conflicts with
        # the full `curl` package, so we don't install `curl` here — the
        # minimal build is fine for fetching the rustup installer.
        run: |
          dnf -y install gcc gcc-c++ make pkgconfig openssl-devel \
            ca-certificates which tar gzip

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version

      - name: cargo install samply
        run: |
          cargo install samply --root "$GITHUB_WORKSPACE/dist"

      - name: Sanity check binary
        run: |
          "$GITHUB_WORKSPACE/dist/bin/samply" --version

      - name: Upload samply binary
        uses: actions/upload-artifact@v4
        with:
          name: samply-binary
          path: dist/bin/samply
          if-no-files-found: error

  build-profiler-frontend:
    name: Build Firefox Profiler frontend
    runs-on: ubuntu-latest
    container:
      # firefox-devtools/profiler's pre-install gate requires Node >= 24.14.
      image: node:24-bookworm
    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Clone firefox-devtools/profiler at pinned commit
        run: |
          git clone https://github.com/firefox-devtools/profiler.git profiler
          cd profiler
          git checkout "$PROFILER_REF"
          git --no-pager log -1 --oneline

      - name: yarn install
        working-directory: profiler
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: yarn build-prod
        working-directory: profiler
        run: yarn build-prod

      - name: Upload profiler dist
        uses: actions/upload-artifact@v4
        with:
          name: profiler-dist
          path: profiler/dist
          if-no-files-found: error

  bundle:
    name: Bundle samply + profiler dist
    runs-on: ubuntu-latest
    needs: [build-samply, build-profiler-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download samply binary
        uses: actions/download-artifact@v4
        with:
          name: samply-binary
          path: stage/bin

      - name: Download profiler dist
        uses: actions/download-artifact@v4
        with:
          name: profiler-dist
          path: stage/profiler-dist

      - name: Assemble bundle
        run: |
          chmod +x stage/bin/samply
          cp scripts/serve.sh stage/serve.sh
          chmod +x stage/serve.sh
          cp README.md stage/README.md
          ls -lR stage | head -50
          tar -C stage -czf samply-rocky9-bundle.tar.gz .

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: samply-rocky9-bundle
          path: samply-rocky9-bundle.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [bundle]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: samply-rocky9-bundle
          path: .

      - name: Create release with bundle attached
        uses: softprops/action-gh-release@v2
        with:
          files: samply-rocky9-bundle.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
